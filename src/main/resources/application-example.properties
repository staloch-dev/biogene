# Renomeie para application.properties e preencha com seus dados
spring.application.name=BioGene

# Configurações do Servidor
server.port=8080

# Configurações do Driver MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/seu_banco?useSSL=false&serverTimezone=UTC
spring.datasource.username=seu_usuario
spring.datasource.password=sua_senha
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Configurações JPA / Hibernate
# DDL: Atualiza a estrutura do DB (cria tabelas se não existirem)
spring.jpa.hibernate.ddl-auto=update
# Exibe e formata o SQL gerado no console
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Configurações do Thymeleaf
# Desativa o cache durante o desenvolvimento para ver as mudanças na hora
spring.thymeleaf.cache=false
# Define onde buscar os arquivos HTML
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

# Configurações de Formato
# Serializa LocalDate/LocalDateTime como strings legíveis, não como timestamps
spring.jackson.serialization.write-dates-as-timestamps=false
# Formato para Data e Hora (LocalDateTime)
spring.jackson.locale=pt_BR
spring.jackson.time-zone=America/Sao_Paulo
